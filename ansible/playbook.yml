# ansible/playbook.yml
---
- name: Prepare servers
  hosts: all
  become: true
  vars_files:
    - vault_vars.yml  # 🔐 Зашифрованные секреты
  
  roles:
    - role: geerlingguy.pip
      tags: [prepare, pip]
      
    - role: geerlingguy.docker
      tags: [prepare, docker]
      # Переменные для роли (опционально, по умолчанию всё работает)
      vars:
        docker_users: ["root"]  # Разрешаем root управлять Docker

- name: Deploy application
  hosts: webservers
  become: true
  vars_files:
    - vault_vars.yml
  
  tasks:
    - name: Create app directory
      file:
        path: "/opt/{{ app_name | default('myapp') }}"
        state: directory
        mode: '0755'
      tags: [deploy, app]

    - name: Pull application image
      community.docker.docker_image:
        name: "{{ app_image | default('nginx:alpine') }}"
        source: pull
      tags: [deploy, app, pull]

    - name: Run application container
      community.docker.docker_container:
        name: "{{ app_name | default('myapp') }}"
        image: "{{ app_image | default('nginx:alpine') }}"
        state: started
        restart_policy: always
        ports:
          - "80:80"
      tags: [deploy, app, start]